<div>
  <h3 class="text-lg font-semibold text-gray-700 mb-2 mt-2 capitalize">
    {{ meaning.partOfSpeech }}
  </h3>

  <ul class="list-disc pl-5 space-y-2 text-gray-600">
    @for (def of meaning.definitions; track $index) {
      <li>
        {{ def.definition }}

        @if (def.example) {
          <p class="text-sm text-gray-400 italic mt-1">
            "{{ def.example }}"
          </p>
        }
      </li>
    }
  </ul>
</div>
